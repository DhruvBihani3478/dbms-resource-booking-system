<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Resource</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>📚 CRBS</h2>

        <ul>
            <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="resources.html"><i class="fa-solid fa-book"></i> Resources</a></li>
            <li><a href="bookings.html"><i class="fa-solid fa-calendar-check"></i> Bookings</a></li>
            <li><a href="reports.html"><i class="fa-solid fa-chart-column"></i> Reports</a></li>
            <li><a href="about.html"><i class="fa-solid fa-circle-info"></i> About</a></li>
            <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div class="dashboard">

            <h2>Book Resource</h2>

            <div class="panel">

                <form>

                    <div class="form-group">
                        <label><b>User Name</b></label>
                        <input type="text" placeholder="Enter User Name">
                    </div>

                    <div class="form-group">
                        <label><b>Select Resource</b></label>
                        <select>
                            <option>Lab 1</option>
                            <option>Room 101</option>
                            <option>Projector A</option>
                            <option>Seminar Hall</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label><b>Booking Date</b></label>
                        <input type="date">
                    </div>

                    <div class="form-group">
                        <label><b>Status</b></label>
                        <select>
                            <option>Pending</option>
                            <option>Approved</option>
                            <option>Cancelled</option>
                        </select>
                    </div>

                    <a href="bookings.html" class="btn">Save Booking</a>

                </form>

            </div>

        </div>

    </main>

</div>

</body>
</html>
