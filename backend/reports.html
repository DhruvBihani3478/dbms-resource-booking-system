<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="layout">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2>📚 CRBS</h2>

        <ul>

            <li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

            <li><a href="resources.html"><i class="fa-solid fa-book"></i> Resources</a></li>

            <li><a href="bookings.html"><i class="fa-solid fa-calendar-check"></i> Bookings</a></li>

            <li><a href="reports.html"><i class="fa-solid fa-chart-column"></i> Reports</a></li>

            <li><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>

        </ul>

    </aside>

    <!-- Main Content -->
    <main class="main-content">

        <div class="dashboard">

            <h2>Reports</h2>

            <!-- Cards -->
            <div class="cards">

                <div class="card">
                    <i class="fa-solid fa-book fa-2x"></i>
                    <h3>Total Resources</h3>
                    <p>4</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-calendar-check fa-2x"></i>
                    <h3>Total Bookings</h3>
                    <p>3</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-circle-check fa-2x"></i>
                    <h3>Approved</h3>
                    <p>1</p>
                </div>

                <div class="card">
                    <i class="fa-solid fa-hourglass-half fa-2x"></i>
                    <h3>Pending</h3>
                    <p>1</p>
                </div>

            </div>

            <!-- Report Table -->
            <div class="panel">

                <h3>Booking Report</h3>

                <table>

                    <tr>
                        <th>Resource</th>
                        <th>Total Bookings</th>
                        <th>Status</th>
                    </tr>

                    <tr>
                        <td>Lab 1</td>
                        <td>1</td>
                        <td class="approved">Approved</td>
                    </tr>

                    <tr>
                        <td>Room 101</td>
                        <td>1</td>
                        <td class="pending">Pending</td>
                    </tr>

                    <tr>
                        <td>Projector A</td>
                        <td>1</td>
                        <td style="color:red;font-weight:bold;">Cancelled</td>
                    </tr>

                </table>

            </div>
